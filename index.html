            border-radius: 12px;

// ============================================================
//  课程管理平台 — 完整升级版
//  新增 Hooks：useEffect / useRef / useMemo / useCallback
//  自定义 Hook：useLocalStorage / useDebounce / useToast
//  功能：localStorage 持久化、防抖搜索、自动聚焦、统计面板

const {
    useState, useEffect, useRef, useMemo, useCallback, useReducer

// ============================================================
//  ✦ 自定义 Hook 1：useLocalStorage
//  封装 localStorage 读写，让 state 自动与本地存储同步
// ============================================================
function useLocalStorage(key, initialValue) {
    // 初始化：优先从 localStorage 读取，读不到则用 initialValue
    const [storedValue, setStoredValue] = useState(() => {
        try {
            const item = window.localStorage.getItem(key);
            return item ? JSON.parse(item) : initialValue;
        } catch (err) {
            console.warn('[useLocalStorage] 读取失败:', err);
            return initialValue;
        }
    });

    // 每次 storedValue 变化时，自动写入 localStorage
    useEffect(() => {
        try {
            window.localStorage.setItem(key, JSON.stringify(storedValue));
        } catch (err) {
            console.warn('[useLocalStorage] 写入失败:', err);
        }
    }, [key, storedValue]);

    return [storedValue, setStoredValue];
}

// ============================================================
//  ✦ 自定义 Hook 2：useDebounce
//  对高频变化的值做防抖处理，减少不必要的重渲染/计算
// ============================================================
function useDebounce(value, delay = 300) {
    const [debouncedValue, setDebouncedValue] = useState(value);

    useEffect(() => {
        const timer = setTimeout(() => {
            setDebouncedValue(value);
        }, delay);
        // 清理函数：组件卸载或 value/delay 变化时清除旧定时器
        return () => clearTimeout(timer);
    }, [value, delay]);

    return debouncedValue;
}

// ============================================================
//  ✦ 自定义 Hook 3：useToast
//  Toast 通知管理，替代 alert() 提供更好的用户体验
// ============================================================
function useToast() {
    const [toasts, setToasts] = useState([]);

    const showToast = useCallback((message, type = 'success', duration = 2600) => {
        const id = Date.now() + Math.random();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => {
            setToasts(prev => prev.filter(t => t.id !== id));
        }, duration);
    }, []);

    const ToastContainer = useCallback(() => (
        <div className="toast-container">
            {toasts.map(t => {
                const iconMap = { success: '✅', info: '🎓', warn: '⚠️' };
                return (
                    <div key={t.id} className={`toast ${t.type}`}>
                        <span>{iconMap[t.type] || '💬'}</span>
                        <span>{t.message}</span>
                    </div>
                );
            })}
        </div>
    ), [toasts]);

    return { showToast, ToastContainer };
}

// ============================================================
//  工具函数：关键词高亮
// ============================================================
function HighlightText({ text, keyword }) {
    if (!keyword || !keyword.trim()) return <span>{text}</span>;
    const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    const parts = text.split(regex);
    return (
        <span>
            {parts.map((part, i) =>
                regex.test(part)
                    ? <mark key={i} className="highlight">{part}</mark>
                    : <span key={i}>{part}</span>
            )}
        </span>
    );
}

const StatsPanel = React.memo(({ courses, filteredCount }) => {
    // useMemo 缓存各分类统计，courses 不变时不重新计算
    const stats = useMemo(() => {
        const total = courses.length;
        const catMap = {};
        categories.forEach(c => {
            if (c !== '全部') catMap[c] = 0;
        });
        courses.forEach(c => {
            const key = catMap.hasOwnProperty(c.category) ? c.category : '其他';
            catMap[key]++;
        });
        return { total, catMap };
    }, [courses]);

    const statItems = [
        { label: '全部课程', value: stats.total, icon: '📚', iconBg: '#dbeafe', iconColor: '#1d4ed8' },
        { label: '搜索结果', value: filteredCount, icon: '🔍', iconBg: '#dcfce7', iconColor: '#15803d' },
        { label: '前端开发', value: stats.catMap['前端开发'] || 0, icon: '🖥️', iconBg: '#dbeafe', iconColor: '#1d4ed8' },
        { label: '后端开发', value: stats.catMap['后端开发'] || 0, icon: '⚙️', iconBg: '#dcfce7', iconColor: '#15803d' },
        { label: '数据科学', value: stats.catMap['数据科学'] || 0, icon: '📊', iconBg: '#fef3c7', iconColor: '#b45309' },

    ];

    return (

// ============================================================
//  CourseCard 组件
//  onDelete / onLearn / onEdit 均由 App 通过 useCallback 传入
// ============================================================
const CourseCard = React.memo(({ course, onDelete, onLearn, onEdit, searchKeyword }) => {
    const catStyle = getCategoryStyle(course.category);

    const handleDelete = useCallback(() => {
        if (window.confirm(`确定要删除课程《${course.name}》吗？`)) {
            onDelete(course.id);
        }
    }, [course.id, course.name, onDelete]);

    const handleLearn  = useCallback(() => onLearn(course.name),  [course.name, onLearn]);
    const handleEdit   = useCallback(() => onEdit(course),         [course, onEdit]);

    return (
        <div style={styles.card} className="card-enhanced">
            <div style={styles.cardHeader}>
                <h3 style={styles.courseName}>
                    <HighlightText text={course.name} keyword={searchKeyword} />
                </h3>
                <div style={styles.actionBtns}>
                    <button
                        onClick={handleEdit}
                        style={styles.iconBtn('#e0f2fe', '#0369a1')}
                        className="enhanced-edit"
                        title="编辑课程"
                        aria-label="编辑课程"
                    >
                        <i className="fas fa-edit"></i>
                    </button>
                    <button
                        onClick={handleDelete}
                        style={styles.iconBtn('#fee2e2', '#b91c1c')}
                        className="enhanced-delete"
                        title="删除课程"
                        aria-label="删除课程"
                    >
                        <i className="fas fa-trash-alt"></i>
                    </button>
                </div>
            </div>

            <span style={{...styles.categoryTag, backgroundColor: catStyle.bg, color: catStyle.color}}>
                {catStyle.icon} {course.category || '其他'}
            </span>

            <p style={styles.description}>
                <HighlightText text={course.description} keyword={searchKeyword} />
            </p>

            <div style={styles.cardActions}>
                <button onClick={handleLearn} style={styles.learnBtn} className="enhanced-learn">
                    <i className="fas fa-play" style={{fontSize: '0.78rem'}}></i> 开始学习
                </button>
                <span style={{fontSize: '0.75rem', color: '#94a3b8'}}>
                    ID #{course.id}
                </span>
            </div>
        </div>
    );
});

// ============================================================
//  CourseList 组件
// ============================================================
const CourseList = React.memo(({ courses, onDeleteCourse, onLearnCourse, onEditCourse, searchKeyword }) => {
    if (!courses || courses.length === 0) {
        return (
            <div style={styles.emptyContainer}>
                <div style={{fontSize: '3.5rem', marginBottom: '0.8rem'}}>
                    {searchKeyword ? '🔍' : '📂'}
                </div>
                <p style={styles.emptyText}>
                    {searchKeyword
                        ? `没有找到与"${searchKeyword}"相关的课程`
                        : '暂无课程，去添加一门吧~'}
                </p>
            </div>
        );
    }

    return (
        <div style={styles.courseListGrid}>
            {courses.map(course => (
                <CourseCard
                    key={course.id}
                    course={course}
                    onDelete={onDeleteCourse}
                    onLearn={onLearnCourse}
                    onEdit={onEditCourse}
                    searchKeyword={searchKeyword}
                />
            ))}
        </div>
    );
});

// ============================================================
//  Footer 组件
// ============================================================
const Footer = React.memo(() => (
    <footer style={styles.footer}>
        <p style={styles.footerText}>
            <i className="far fa-copyright" style={{marginRight: '6px'}}></i>
            {new Date().getFullYear()} 智学课程平台 · localStorage 持久化 · useEffect / useRef / useMemo / useCallback / 自定义 Hook
        </p>
    </footer>
));

// ============================================================
//  编辑弹窗组件
// ============================================================
const EditModal = React.memo(({ course, onSave, onCancel }) => {
    const [editName, setEditName]         = useState(course.name);
    const [editDesc, setEditDesc]         = useState(course.description);
    const [editCategory, setEditCategory] = useState(course.category || '其他');
    const [nameErr, setNameErr]           = useState('');

    // useRef：编辑弹窗打开时自动聚焦课程名称输入框
    const editNameRef = useRef(null);
    useEffect(() => {
        if (editNameRef.current) {
            editNameRef.current.focus();
            editNameRef.current.select();
        }
    }, []);

    const handleSave = () => {
        const trimmed = editName.trim();
        if (!trimmed) { setNameErr('课程名称不能为空'); return; }
        onSave({ ...course, name: trimmed, description: editDesc.trim(), category: editCategory });
    };

    return (
        <div style={styles.modalOverlay} onClick={(e) => e.target === e.currentTarget && onCancel()}>
            <div style={styles.modalContent}>
                <h2 style={styles.modalTitle}>
                    <i className="fas fa-edit" style={{color: '#2c7da0'}}></i>
                    编辑课程
                </h2>

                <div style={styles.formGroup}>
                    <label style={styles.label}>课程名称 <span style={{color:'#e53e3e'}}>*</span></label>
                    <input
                        ref={editNameRef}
                        type="text"
                        style={{...styles.input, borderColor: nameErr ? '#f56565' : '#e2e8f0'}}
                        value={editName}
                        onChange={(e) => { setEditName(e.target.value); if (nameErr) setNameErr(''); }}
                    />
                    {nameErr && <p style={styles.errorMsg}>{nameErr}</p>}
                </div>

                <div style={styles.formGroup}>
                    <label style={styles.label}>课程简介</label>
                    <textarea
                        style={styles.textarea}
                        rows="3"
                        value={editDesc}
                        onChange={(e) => setEditDesc(e.target.value)}
                    />
                    <div style={styles.charHint}>{editDesc.length}/200</div>
                </div>

                <div style={styles.formGroup}>
                    <label style={styles.label}>课程分类</label>
                    <select
                        className="category-select"
                        value={editCategory}
                        onChange={(e) => setEditCategory(e.target.value)}
                    >
                        {categories.filter(c => c !== '全部').map(cat => (
                            <option key={cat} value={cat}>{cat}</option>
                        ))}
                    </select>
                </div>

                <div style={styles.modalActions}>
                    <button onClick={onCancel} style={styles.cancelBtn}>取消</button>
                    <button onClick={handleSave} style={styles.saveBtn}>保存修改</button>
                </div>
            </div>
        </div>
    );
});

// ============================================================
//  App 主组件
// ============================================================
const App = () => {
    // ✦ useLocalStorage：课程数据自动持久化到 localStorage
    const [courses, setCourses] = useLocalStorage(STORAGE_KEY, initialCourses);

    // 表单状态
    const [newCourseName, setNewCourseName] = useState('');
    const [newCourseDesc, setNewCourseDesc] = useState('');
    const [newCourseCategory, setNewCourseCategory] = useState('前端开发');
    const [nameError, setNameError]         = useState('');

    // 搜索 & 筛选状态（搜索词会经过 useDebounce 防抖）
    const [searchInput, setSearchInput]       = useState('');
    const [selectedCategory, setSelectedCategory] = useState('全部');

    // ✦ useDebounce：防抖搜索，300ms 后才触发过滤，避免每次键入都重新计算
    const debouncedSearch = useDebounce(searchInput, 300);

    // 编辑弹窗状态
    const [editingCourse, setEditingCourse] = useState(null);

    // Toast 通知
    const { showToast, ToastContainer } = useToast();

    // ✦ useRef：新增课程后让课程名称输入框自动聚焦
    const courseNameInputRef = useRef(null);

    // ✦ useEffect：首次加载时，在控制台打印读取到的课程数（用于演示 localStorage 已读取）
    useEffect(() => {
        console.log(`[App] 从 localStorage 读取到 ${courses.length} 门课程`);
    }, []); // 仅首次执行

    // ✦ useMemo：缓存过滤后的课程列表
    //   只有 courses / debouncedSearch / selectedCategory 变化时才重新计算
    const filteredCourses = useMemo(() => {
        const kw = debouncedSearch.trim().toLowerCase();
        return courses.filter(course => {
            const matchSearch = !kw
                || course.name.toLowerCase().includes(kw)
                || course.description.toLowerCase().includes(kw)
                || (course.category || '').toLowerCase().includes(kw);
            const matchCat = selectedCategory === '全部' || course.category === selectedCategory;
            return matchSearch && matchCat;
        });
    }, [courses, debouncedSearch, selectedCategory]);

    // ✦ useMemo：缓存各分类课程数量（用于筛选按钮的 badge）
    const categoryStats = useMemo(() => {
        const map = {};
        categories.forEach(c => {
            map[c] = c === '全部'
                ? courses.length
                : courses.filter(course => course.category === c).length;
        });
        return map;
    }, [courses]);

    // ============ useCallback 优化事件处理函数 ============

    // ✦ useCallback：新增课程
    const handleAddCourse = useCallback(() => {
        const trimmedName = newCourseName.trim();
        if (!trimmedName) {
            setNameError('课程名称不能为空，请填写课程名称');
            courseNameInputRef.current && courseNameInputRef.current.focus();
            return;
        }
        const finalDesc = newCourseDesc.trim() || '暂无简介，讲师即将补充精彩内容。';
        const newCourse = {
            id: Date.now() + Math.floor(Math.random() * 10000),
            name: trimmedName,
            description: finalDesc,
            category: newCourseCategory,
        };
        setCourses(prev => [newCourse, ...prev]);
        setNewCourseName('');
        setNewCourseDesc('');
        setNameError('');
        showToast(`课程"${trimmedName}"已成功发布！`, 'success');

        // ✦ useRef + useEffect 联动：新增后自动聚焦课程名输入框
        setTimeout(() => {
            courseNameInputRef.current && courseNameInputRef.current.focus();
        }, 50);
    }, [newCourseName, newCourseDesc, newCourseCategory, setCourses, showToast]);

    // ✦ useCallback：删除课程
    const handleDeleteCourse = useCallback((courseId) => {
        setCourses(prev => prev.filter(c => c.id !== courseId));
        showToast('课程已删除', 'warn');
    }, [setCourses, showToast]);

    // ✦ useCallback："开始学习"点击
    const handleLearnCourse = useCallback((courseName) => {
        showToast(`正在进入《${courseName}》，祝学习愉快！`, 'info');
    }, [showToast]);

    // ✦ useCallback：打开编辑弹窗
    const handleEditCourse = useCallback((course) => {
        setEditingCourse(course);
    }, []);

    // ✦ useCallback：保存编辑
    const handleSaveEdit = useCallback((updatedCourse) => {
        setCourses(prev => prev.map(c => c.id === updatedCourse.id ? updatedCourse : c));
        setEditingCourse(null);
        showToast(`课程"${updatedCourse.name}"已更新！`, 'success');
    }, [setCourses, showToast]);

    // ✦ useCallback：取消编辑
    const handleCancelEdit = useCallback(() => {
        setEditingCourse(null);
    }, []);

    // ✦ useCallback：搜索输入变化
    const handleSearchChange = useCallback((e) => {
        setSearchInput(e.target.value);
    }, []);

    // ✦ useCallback：分类筛选切换
    const handleCategoryChange = useCallback((cat) => {
        setSelectedCategory(cat);
    }, []);

    // ✦ useCallback：清空搜索
    const handleClearSearch = useCallback(() => {
        setSearchInput('');
        courseNameInputRef.current && courseNameInputRef.current.focus();
    }, []);

    // ✦ useCallback：表单字段变化
    const handleNameChange = useCallback((e) => {
        setNewCourseName(e.target.value);
        if (nameError) setNameError('');
    }, [nameError]);

    const handleDescChange       = useCallback((e) => setNewCourseDesc(e.target.value),       []);
    const handleCategorySelect   = useCallback((e) => setNewCourseCategory(e.target.value),    []);

    // ✦ useCallback：回车键提交
    const handleKeyDown = useCallback((e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleAddCourse();
        }
    }, [handleAddCourse]);

    // ============ 渲染 ============
    return (
        <div style={styles.appContainer}>
            <Header />

            <main style={styles.mainContent}>

                {/* ===== 统计面板 ===== */}
                <StatsPanel courses={courses} filteredCount={filteredCourses.length} />

                {/* ===== 新增课程表单 ===== */}
                <div style={styles.formCard}>
                    <h2 style={styles.formTitle}>
                        <i className="fas fa-plus-circle" style={{color: '#2c7da0'}}></i>
                        创建新课程
                    </h2>

                    {/* 课程名称 & 分类：两列布局 */}
                    <div style={styles.formGrid}>
                        <div style={styles.formGroup}>
                            <label style={styles.label}>
                                课程名称 <span style={{color: '#e53e3e'}}>*</span>
                            </label>
                            <input
                                ref={courseNameInputRef}
                                type="text"
                                style={{...styles.input, borderColor: nameError ? '#f56565' : '#e2e8f0'}}
                                placeholder="例如：Python 数据分析实战"
                                value={newCourseName}
                                onChange={handleNameChange}
                                onKeyDown={handleKeyDown}
                            />
                            {nameError && <p style={styles.errorMsg}><i className="fas fa-exclamation-circle" style={{marginRight:'4px'}}></i>{nameError}</p>}
                        </div>

                        <div style={styles.formGroup}>
                            <label style={styles.label}>课程分类</label>
                            <select
                                className="category-select"
                                value={newCourseCategory}
                                onChange={handleCategorySelect}
                            >
                                {categories.filter(c => c !== '全部').map(cat => (
                                    <option key={cat} value={cat}>{cat}</option>
                                ))}
                            </select>
                        </div>
                    </div>

                    {/* 课程简介 */}
                    <div style={styles.formGroup}>
                        <label style={styles.label}>课程简介</label>
                        <textarea
                            style={styles.textarea}
                            rows="3"
                            placeholder="简要介绍课程内容、学习目标或亮点..."
                            value={newCourseDesc}
                            onChange={handleDescChange}
                        />
                        <div style={styles.charHint}>{newCourseDesc.length}/200</div>
                    </div>

                    <button onClick={handleAddCourse} style={styles.submitBtn} className="enhanced-submit">
                        <i className="fas fa-save"></i> 发布课程
                    </button>
                </div>

                {/* ===== 课程列表区域 ===== */}
                <div style={styles.coursesSection}>
                    <div style={styles.sectionHeader}>
                        <div>
                            <h2 style={styles.sectionTitle}>
                                <i className="fas fa-list-ul" style={{color: '#2c7da0'}}></i>
                                全部课程
                                <span style={styles.courseCountBadge}>{filteredCourses.length}</span>
                            </h2>
                            <div style={styles.divider}></div>
                        </div>

                        {/* 搜索提示 */}
                        {debouncedSearch && (
                            <div style={{fontSize: '0.85rem', color: '#64748b', display: 'flex', alignItems: 'center', gap: '6px'}}>
                                <i className="fas fa-search"></i>
                                搜索「{debouncedSearch}」· 找到 {filteredCourses.length} 个结果
                                <button
                                    onClick={handleClearSearch}
                                    style={{border: 'none', background: '#fee2e2', color: '#b91c1c', borderRadius: '50%', width: '22px', height: '22px', cursor: 'pointer', fontSize: '0.7rem', display: 'flex', alignItems: 'center', justifyContent: 'center'}}
                                    title="清空搜索"
                                >
                                    <i className="fas fa-times"></i>
                                </button>
                            </div>
                        )}
                    </div>

                    {/* 搜索框 + 分类筛选 */}
                    <div style={styles.searchFilterRow}>
                        <div style={styles.searchBox}>
                            <i className="fas fa-search" style={styles.searchIcon}></i>
                            <input
                                type="text"
                                style={styles.searchInput}
                                placeholder="搜索课程名称、简介或分类..."
                                value={searchInput}
                                onChange={handleSearchChange}
                            />
                        </div>
                        <div style={styles.filterSection}>
                            {categories.map(cat => (
                                <button
                                    key={cat}
                                    className="filter-btn"
                                    onClick={() => handleCategoryChange(cat)}
                                    style={{
                                        ...styles.filterBtn,
                                        ...(selectedCategory === cat ? styles.filterBtnActive : {})
                                    }}
                                >
                                    {cat}
                                    <span style={{
                                        marginLeft: '4px',
                                        background: selectedCategory === cat ? 'rgba(255,255,255,0.25)' : '#f1f5f9',
                                        color: selectedCategory === cat ? 'white' : '#64748b',
                                        borderRadius: '10px',
                                        padding: '1px 6px',
                                        fontSize: '0.75rem',
                                        fontWeight: '600',
                                    }}>
                                        {categoryStats[cat] || 0}
                                    </span>
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* 课程列表 */}
                    <CourseList
                        courses={filteredCourses}
                        onDeleteCourse={handleDeleteCourse}
                        onLearnCourse={handleLearnCourse}
                        onEditCourse={handleEditCourse}
                        searchKeyword={debouncedSearch}
                    />
                </div>

            </main>

            <Footer />

            {/* 编辑弹窗 */}
            {editingCourse && (
                <EditModal
                    course={editingCourse}
                    onSave={handleSaveEdit}
                    onCancel={handleCancelEdit}
                />
            )}

            {/* Toast 通知 */}
            <ToastContainer />
        </div>
    );
};

// ======================== 渲染应用 ========================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
