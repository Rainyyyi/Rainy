<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Rainy</title>
        <style>
            #container{
                background: wheat;
                display:flex;
                align-items: center;
                flex-direction: column;
                justify-content: center;
                padding: 20px;
            }
            #button{
                background-color: rgb(240, 171, 146);
                width: 100px;
                height:50px;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }
            .h{
                color: rgb(247, 77, 5);
                font-family: Arial, Helvetica, sans-serif;
            }
        </style>
    </head>
<body id="container">
    <div>
        <h1 class="h">你好呀</h1>
    </div> 
    <div>
        <button onclick="myFunction()" id="button">点我试一试呀</button>
        <script>
            function myFunction()
            {
                document.getElementById("demo").innerHTML="誰是这世界上最美的人呀？";
            }
        </script>
    </div>
    <p></p>
    <button onclick="answer()" id="button">点我看答案鸭</button>
    <script>
    function answer()
    {
        document.getElementById("an").innerHTML="当然是这个网页的主人啦，嘻嘻";
    }
    </script>
    <p id="demo"></p>
    <p></p>
    <p id="an"></p>
    <p> 



    </p>
    <button onclick="extra()" id="button">点完上面的再点我哦</button>
    <script>
        function extra()
        {
            document.getElementById("ee").innerHTML="我知道这个界面很丑，但比白的好看一点吧qwq";
        }
    </script>
    <p id="ee"></p>
    <p>





    </p>
    <button onclick="last()" id="button">最后点我哦</button>
    <script>
        function last()
        {
            document.getElementById("la").innerHTML="好吧我承认它确实还是很丑";
        }
    </script>
    <p id="la"> </p>

    
</body>
</html>
